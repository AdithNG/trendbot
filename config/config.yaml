universe:
  mode: sp500_top_liquid
  max_symbols: 20
  min_avg_volume: 5_000_000

strategy:
  name: ema_momentum
  fast_ema: 20
  slow_ema: 50
  atr_period: 14
  atr_stop_multiplier: 2.0
  volume_confirmation_ratio: 1.5
  rsi_period: 14
  rsi_overbought: 65
  rsi_oversold: 35

risk:
  position_pct_of_portfolio: 0.25   # 25% of portfolio per position
  max_open_positions: 4
  daily_loss_limit: 0.05            # Halt trading if daily P&L < -5%

schedule:
  data_refresh_interval_minutes: 5
  market_open_buffer_minutes: 15    # Skip volatile first 15 min
  market_close_buffer_minutes: 30   # No new entries in last 30 min

backtest:
  # ANTI-OVERFITTING: Use 2015-2019 for design, 2020-2021 for validation,
  # 2022-2024 as sealed out-of-sample test.
  # Default run uses training period only.
  start_date: "2015-01-01"
  end_date: "2019-12-31"
  initial_capital: 10000
  commission_pct: 0.001
  data_interval: "1d"

logging:
  level: DEBUG
  log_dir: logs/
